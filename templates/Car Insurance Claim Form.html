<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Insurance Eligibility</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #2B9E81; /* Sea Green */
        }
        .form-container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .result {
            margin-top: 20px;
            font-size: 1.25rem;
            text-align: center;
            font-weight: bold;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h3 class="text-center mb-4">Car Insurance Eligibility Form</h3>
        <form action="/predict" method="POST">
            <div class="mb-3">
                <label for="age" class="form-label">Age</label>
                <input type="number" class="form-control" id="age" name="age" required value="{{ request.form.age }}">
            </div>

            <div class="mb-3">
                <label for="credit_score" class="form-label">Credit Score</label>
                <input type="number" step="0.01" class="form-control" id="credit_score" name="credit_score" required value="{{ request.form.credit_score }}">
            </div>

            <div class="mb-3">
                <label for="annual_mileage" class="form-label">Annual Mileage</label>
                <input type="number" step="0.01" class="form-control" id="annual_mileage" name="annual_mileage" required value="{{ request.form.annual_mileage }}">
            </div>

            <div class="mb-3">
                <label for="vehicle_ownership" class="form-label">Vehicle Ownership</label>
                <select class="form-select" id="vehicle_ownership" name="vehicle_ownership" required>
                    <option value="0" {% if request.form.vehicle_ownership == '0' %}selected{% endif %}>No</option>
                    <option value="1" {% if request.form.vehicle_ownership == '1' %}selected{% endif %}>Yes</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="vehicle_year" class="form-label">Vehicle Year</label>
                <select class="form-select" id="vehicle_year" name="vehicle_year" required>
                    <option value="0" {% if request.form.vehicle_year == '0' %}selected{% endif %}>Before 2015</option>
                    <option value="1" {% if request.form.vehicle_year == '1' %}selected{% endif %}>2015 or after</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="speeding_violations" class="form-label">Speeding Violations</label>
                <input type="number" class="form-control" id="speeding_violations" name="speeding_violations" required value="{{ request.form.speeding_violations }}">
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary w-50">Check Eligibility</button>
                <a href="/" class="btn btn-secondary w-50">Start New Prediction</a>
            </div>
        </form>

        {% if prediction_result %}
        <div class="result text-success">
            {{ prediction_result }}
        </div>
        {% endif %}
    </div>
</body>
</html>
