<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#1d4350,#a43931);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:35px;
border-radius:12px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:10px;
}
</style>

</head>

<body>

<div class="box">

<h2>Register</h2>

<form action="/register_user" method="POST">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<a href="/">Already have an account? Login</a>

</div>

</body>
</html>
